services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: nook
      POSTGRES_PASSWORD: nook
      POSTGRES_DB: nook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nook"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/and-ri/nook-server:latest
    # Not published to the host — reached internally by web as http://server:3001.
    # Add `ports: ["3002:3001"]` if you need to hit the API directly for debugging.
    expose:
      - "3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://nook:nook@postgres:5432/nook
      JWT_SECRET: ${JWT_SECRET}
      ORIGIN_URL: http://localhost:3001
      # Public web URL used in email links (e.g. password reset)
      APP_URL: ${APP_URL:-http://localhost:3001}
      # Email delivery — set RESEND_API_KEY or the SMTP_* vars to enable reminders
      EMAIL_FROM: ${EMAIL_FROM:-Nook <no-reply@nook.app>}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/and-ri/nook-web:latest
    ports:
      - "3001:3001"
    environment:
      API_BASE_URL: http://server:3001
      # Umami analytics (optional) — set both to enable tracking
      UMAMI_SCRIPT_URL: ${UMAMI_SCRIPT_URL:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
    depends_on:
      - server

volumes:
  postgres_data:
